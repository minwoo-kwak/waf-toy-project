# Redis 배포 - Rate Limiting용
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: waf-system
  labels:
    app: redis
    component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
          name: redis
        # Redis 설정 최적화
        args:
          - redis-server
          - --maxmemory
          - "256mb"
          - --maxmemory-policy
          - "allkeys-lru"
          - --save
          - ""  # 디스크 저장 비활성화 (캐시용도)
          - --appendonly
          - "no"
        resources:
          requests:
            memory: 128Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 200m
        # 헬스체크 설정
        livenessProbe:
          tcpSocket:
            port: 6379
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          exec:
            command:
            - redis-cli
            - ping
          initialDelaySeconds: 5
          periodSeconds: 5
        # 보안 설정
        securityContext:
          runAsNonRoot: true
          runAsUser: 999
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
        volumeMounts:
        - name: redis-data
          mountPath: /data
      volumes:
      - name: redis-data
        emptyDir: {}

---
# Redis Service
apiVersion: v1
kind: Service
metadata:
  name: redis-service
  namespace: waf-system
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
      name: redis
  selector:
    app: redis

---
# Redis ConfigMap (추가 설정)
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-config
  namespace: waf-system
data:
  redis.conf: |
    # Redis 설정 파일
    
    # 메모리 설정
    maxmemory 256mb
    maxmemory-policy allkeys-lru
    
    # 네트워크 설정
    bind 0.0.0.0
    port 6379
    timeout 300
    
    # 로그 설정
    loglevel notice
    
    # 지속성 비활성화 (캐시 용도)
    save ""
    appendonly no
    
    # 보안 설정 (실제 운영에서는 AUTH 사용 권장)
    # requirepass your-secure-password-here
    
    # 성능 최적화
    tcp-keepalive 300
    tcp-backlog 511