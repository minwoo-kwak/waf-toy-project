# Elasticsearch 배포
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: elasticsearch
  namespace: waf-system
  labels:
    app: elasticsearch
spec:
  serviceName: elasticsearch
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
      - name: elasticsearch
        image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
        ports:
        - containerPort: 9200
          name: http
        - containerPort: 9300
          name: transport
        env:
        - name: discovery.type
          value: single-node
        - name: ES_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: xpack.security.enabled
          value: "false"  # 개발용 (운영에서는 활성화 권장)
        - name: xpack.security.enrollment.enabled
          value: "false"
        volumeMounts:
        - name: elasticsearch-data
          mountPath: /usr/share/elasticsearch/data
        resources:
          requests:
            memory: 1Gi
            cpu: 500m
          limits:
            memory: 2Gi
            cpu: 1000m
        readinessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 30
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /_cluster/health
            port: 9200
          initialDelaySeconds: 60
          periodSeconds: 30
  volumeClaimTemplates:
  - metadata:
      name: elasticsearch-data
    spec:
      accessModes: ["ReadWriteOnce"]
      resources:
        requests:
          storage: 5Gi

---
# Elasticsearch Service
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: waf-system
  labels:
    app: elasticsearch
spec:
  type: ClusterIP
  ports:
    - port: 9200
      targetPort: 9200
      protocol: TCP
      name: http
    - port: 9300
      targetPort: 9300
      protocol: TCP
      name: transport
  selector:
    app: elasticsearch

---
# Kibana 배포
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: waf-system
  labels:
    app: kibana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      containers:
      - name: kibana
        image: docker.elastic.co/kibana/kibana:8.10.0
        ports:
        - containerPort: 5601
          name: kibana
        env:
        - name: ELASTICSEARCH_HOSTS
          value: "http://elasticsearch:9200"
        - name: SERVER_HOST
          value: "0.0.0.0"
        - name: XPACK_SECURITY_ENABLED
          value: "false"
        - name: XPACK_ENCRYPTEDSAVEDOBJECTS_ENCRYPTIONKEY
          value: "min-32-byte-long-strong-encryption-key"
        volumeMounts:
        - name: kibana-config
          mountPath: /usr/share/kibana/config/kibana.yml
          subPath: kibana.yml
        resources:
          requests:
            memory: 512Mi
            cpu: 200m
          limits:
            memory: 1Gi
            cpu: 500m
        readinessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /api/status
            port: 5601
          initialDelaySeconds: 120
          periodSeconds: 30
      volumes:
      - name: kibana-config
        configMap:
          name: kibana-config

---
# Kibana Service
apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: waf-system
  labels:
    app: kibana
spec:
  type: ClusterIP
  ports:
    - port: 5601
      targetPort: 5601
      protocol: TCP
      name: kibana
  selector:
    app: kibana

---
# Kibana 설정 ConfigMap
apiVersion: v1
kind: ConfigMap
metadata:
  name: kibana-config
  namespace: waf-system
data:
  kibana.yml: |
    server.host: "0.0.0.0"
    server.port: 5601
    elasticsearch.hosts: ["http://elasticsearch:9200"]
    
    # 로깅 설정
    logging.appenders:
      file:
        type: file
        fileName: /usr/share/kibana/logs/kibana.log
        layout:
          type: json
    logging.root:
      appenders:
        - default
        - file
    
    # 모니터링 설정
    monitoring.ui.container.elasticsearch.enabled: true
    
    # 샘플 데이터 자동 로드 비활성화
    newsfeed.enabled: false
    telemetry.optIn: false
    
    # 대시보드 자동 가져오기 설정
    xpack.infra.enabled: false
    xpack.logs.enabled: false
    xpack.apm.enabled: false

---
# Logstash 배포 (로그 파이프라인 처리)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: waf-system
  labels:
    app: logstash
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      containers:
      - name: logstash  
        image: docker.elastic.co/logstash/logstash:8.10.0
        ports:
        - containerPort: 5044
          name: beats
        - containerPort: 9600
          name: http
        env:
        - name: LS_JAVA_OPTS
          value: "-Xmx512m -Xms512m"
        volumeMounts:
        - name: logstash-config
          mountPath: /usr/share/logstash/pipeline/
        - name: logstash-settings
          mountPath: /usr/share/logstash/config/logstash.yml
          subPath: logstash.yml
        resources:
          requests:
            memory: 1Gi
            cpu: 500m
          limits:
            memory: 2Gi
            cpu: 1000m
        readinessProbe:
          httpGet:
            path: /
            port: 9600
          initialDelaySeconds: 60
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: 9600
          initialDelaySeconds: 90
          periodSeconds: 30
      volumes:
      - name: logstash-config
        configMap:
          name: logstash-config
      - name: logstash-settings
        configMap:
          name: logstash-settings

---
# Logstash Service
apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: waf-system
  labels:
    app: logstash
spec:
  type: ClusterIP
  ports:
    - port: 5044
      targetPort: 5044
      protocol: TCP
      name: beats
    - port: 9600
      targetPort: 9600
      protocol: TCP
      name: http
  selector:
    app: logstash

---
# Logstash 파이프라인 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: waf-system
data:
  waf-pipeline.conf: |
    input {
      # Beats로부터 로그 수신
      beats {
        port => 5044
      }
      
      # HTTP로 직접 로그 수신 (WAF Gateway에서)
      http {
        port => 8080
        codec => json
      }
    }
    
    filter {
      # 타임스탬프 파싱
      date {
        match => [ "@timestamp", "ISO8601" ]
        target => "@timestamp"
      }
      
      # JSON 파싱
      if [message] {
        json {
          source => "message"
        }
      }
      
      # GeoIP 추가 (클라이언트 IP 기반)
      if [client_ip] {
        geoip {
          source => "client_ip"
          target => "geoip"
        }
      }
      
      # User-Agent 파싱
      if [user_agent] {
        useragent {
          source => "user_agent"
          target => "ua"
        }
      }
      
      # 위협 점수 범주화
      if [threat_score] {
        if [threat_score] >= 8 {
          mutate { add_field => { "threat_level" => "critical" } }
        } else if [threat_score] >= 6 {
          mutate { add_field => { "threat_level" => "high" } }
        } else if [threat_score] >= 4 {
          mutate { add_field => { "threat_level" => "medium" } }
        } else {
          mutate { add_field => { "threat_level" => "low" } }
        }
      }
      
      # 응답 시간 범주화
      if [response_time_ms] {
        if [response_time_ms] > 5000 {
          mutate { add_field => { "performance_category" => "very_slow" } }
        } else if [response_time_ms] > 1000 {
          mutate { add_field => { "performance_category" => "slow" } }
        } else if [response_time_ms] > 500 {
          mutate { add_field => { "performance_category" => "medium" } }
        } else {
          mutate { add_field => { "performance_category" => "fast" } }
        }
      }
      
      # 상태 코드 범주화
      if [status_code] {
        if [status_code] >= 500 {
          mutate { add_field => { "status_category" => "server_error" } }
          mutate { add_tag => [ "error", "5xx" ] }
        } else if [status_code] >= 400 {
          mutate { add_field => { "status_category" => "client_error" } }
          mutate { add_tag => [ "error", "4xx" ] }
        } else if [status_code] >= 300 {
          mutate { add_field => { "status_category" => "redirect" } }
          mutate { add_tag => [ "redirect", "3xx" ] }
        } else if [status_code] >= 200 {
          mutate { add_field => { "status_category" => "success" } }
          mutate { add_tag => [ "success", "2xx" ] }
        }
      }
      
      # 의심스러운 패턴 감지 강화
      if [path] {
        # 관리자 페이지 접근 시도
        if [path] =~ /\/(admin|administrator|manage|wp-admin|phpmyadmin)/ {
          mutate { add_tag => [ "admin_access_attempt" ] }
        }
        
        # 백업 파일 접근 시도
        if [path] =~ /\.(backup|bak|old|tmp|~)$/ {
          mutate { add_tag => [ "backup_file_access" ] }
        }
        
        # 설정 파일 접근 시도
        if [path] =~ /\.(conf|config|ini|env)$/ {
          mutate { add_tag => [ "config_file_access" ] }
        }
      }
      
      # 악성 User-Agent 감지
      if [user_agent] {
        if [user_agent] =~ /(bot|crawler|scanner|sqlmap|nikto|nessus|acunetix|burp)/i {
          mutate { add_tag => [ "suspicious_user_agent" ] }
        }
      }
    }
    
    output {
      # Elasticsearch로 출력
      elasticsearch {
        hosts => ["elasticsearch:9200"]
        index => "waf-logs-%{+YYYY.MM.dd}"
        template_name => "waf-logs"
        template_pattern => "waf-logs-*"
        template => {
          "index_patterns" => ["waf-logs-*"],
          "settings" => {
            "number_of_shards" => 1,
            "number_of_replicas" => 0
          },
          "mappings" => {
            "properties" => {
              "@timestamp" => { "type" => "date" },
              "client_ip" => { "type" => "ip" },
              "geoip" => {
                "properties" => {
                  "location" => { "type" => "geo_point" },
                  "country_name" => { "type" => "keyword" },
                  "city_name" => { "type" => "keyword" }
                }
              },
              "threat_score" => { "type" => "integer" },
              "response_time_ms" => { "type" => "float" },
              "status_code" => { "type" => "integer" },
              "blocked" => { "type" => "boolean" },
              "threat_type" => { "type" => "keyword" },
              "method" => { "type" => "keyword" },
              "tags" => { "type" => "keyword" }
            }
          }
        }
      }
      
      # 디버그용 출력 (개발 시에만 사용)
      # stdout { codec => rubydebug }
    }

---
# Logstash 기본 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-settings
  namespace: waf-system
data:
  logstash.yml: |
    http.host: "0.0.0.0"
    path.config: /usr/share/logstash/pipeline
    pipeline.workers: 2
    pipeline.batch.size: 125
    pipeline.batch.delay: 5
    queue.type: memory
    dead_letter_queue.enable: false
    
    # 모니터링 설정
    xpack.monitoring.enabled: false
    
    # 로그 설정
    log.level: info
    path.logs: /usr/share/logstash/logs

---
# Filebeat 배포 (로그 수집용) - DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: filebeat
  namespace: waf-system
  labels:
    app: filebeat
spec:
  selector:
    matchLabels:
      app: filebeat
  template:
    metadata:
      labels:
        app: filebeat
    spec:
      serviceAccountName: filebeat
      terminationGracePeriodSeconds: 30
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      containers:
      - name: filebeat
        image: docker.elastic.co/beats/filebeat:8.10.0
        args: [
          "-c", "/etc/filebeat.yml",
          "-e",
        ]
        env:
        - name: ELASTICSEARCH_HOST
          value: elasticsearch
        - name: ELASTICSEARCH_PORT
          value: "9200"
        - name: LOGSTASH_HOST
          value: logstash
        - name: LOGSTASH_PORT
          value: "5044"
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        securityContext:
          runAsUser: 0
        resources:
          limits:
            memory: 200Mi
            cpu: 100m
          requests:
            memory: 100Mi
            cpu: 100m
        volumeMounts:
        - name: config
          mountPath: /etc/filebeat.yml
          readOnly: true
          subPath: filebeat.yml
        - name: data
          mountPath: /usr/share/filebeat/data
        - name: varlibdockercontainers
          mountPath: /var/lib/docker/containers
          readOnly: true
        - name: varlog
          mountPath: /var/log
          readOnly: true
      volumes:
      - name: config
        configMap:
          defaultMode: 0600
          name: filebeat-config
      - name: varlibdockercontainers
        hostPath:
          path: /var/lib/docker/containers
      - name: varlog
        hostPath:
          path: /var/log
      - name: data
        hostPath:
          path: /var/lib/filebeat-data
          type: DirectoryOrCreate

---
# Filebeat Service Account
apiVersion: v1
kind: ServiceAccount
metadata:
  name: filebeat
  namespace: waf-system

---
# Filebeat ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: filebeat
rules:
- apiGroups: [""] # "" indicates the core API group
  resources:
  - namespaces
  - pods
  - nodes
  verbs:
  - get
  - watch
  - list

---
# Filebeat ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: filebeat
subjects:
- kind: ServiceAccount
  name: filebeat
  namespace: waf-system
roleRef:
  kind: ClusterRole
  name: filebeat
  apiGroup: rbac.authorization.k8s.io

---
# Filebeat 설정
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebeat-config
  namespace: waf-system
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: container
      paths:
        - /var/log/containers/*waf-gateway*.log
      processors:
      - add_kubernetes_metadata:
          host: ${NODE_NAME}
          matchers:
          - logs_path:
              logs_path: "/var/log/containers/"
    
    # WAF 특화 로그 파싱
    - type: log
      paths:
        - /var/log/modsecurity/*.log
      fields:
        logtype: modsecurity
      fields_under_root: true
    
    processors:
    - add_host_metadata:
        when.not.contains.tags: forwarded
    - add_cloud_metadata: ~
    - add_docker_metadata: ~
    - add_kubernetes_metadata: ~
    
    # Logstash로 출력
    output.logstash:
      hosts: ["${LOGSTASH_HOST}:${LOGSTASH_PORT}"]
    
    # 로깅 설정
    logging.level: info
    logging.to_files: true
    logging.files:
      path: /var/log/filebeat
      name: filebeat
      keepfiles: 7
      permissions: 0644